name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "5 0 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        env:
          SITE__SITE__URL: "https://chunt.org"
          SITE__SITE__BASE_PATH: ${{ secrets.SITE__SITE__BASE_PATH }}
          SITE__SITE__ASSETS_URL: ${{ secrets.SITE__SITE__ASSETS_URL }}
          SITE__LINKS__EMAIL: ${{ secrets.SITE__LINKS__EMAIL }}
          SITE__ANALYTICS__GOATCOUNTER__ENABLED: ${{ secrets.SITE__ANALYTICS__GOATCOUNTER__ENABLED }}
          SITE__ANALYTICS__GOATCOUNTER__URL: ${{ secrets.SITE__ANALYTICS__GOATCOUNTER__URL }}
          MINIFY: "1"
        run: python build.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Keep workflow alive
        if: github.event_name == 'schedule'
        run: |
          date -u > .last-build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .last-build
          git diff --cached --quiet || git commit -m "Update .last-build timestamp [skip ci]" && git push
